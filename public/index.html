<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.A.R.E.M.E.D. - Pacientes</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; }
        body { background: #f0f2f5; }
        
        header { background: #ffffff; color: #0056b3; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); flex-wrap: wrap; gap: 10px; }
        .logo-img { height: 40px; display: block; object-fit: contain; }
        
        nav { display: flex; gap: 8px; flex-wrap: wrap; }
        nav a { color: #0056b3; text-decoration: none; padding: 6px 12px; border-radius: 6px; background: #eef5ff; font-size: 13px; font-weight: bold; transition: background 0.2s; }
        nav a:hover, nav a.active { background: #0056b3; color: white; }

        .container { display: flex; flex-direction: column; height: calc(100vh - 65px); }
        #map { height: 40vh; width: 100%; }
        
        .panel { height: 60vh; overflow-y: auto; padding: 20px; background: white; border-radius: 20px 20px 0 0; margin-top: -15px; z-index: 1000; box-shadow: 0 -3px 10px rgba(0,0,0,0.1); }
        .search-container { margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; }
        .search-bar { width: 100%; padding: 10px 15px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; outline: none; }
        .filter-tags { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; }
        .tag-btn { background: #e9ecef; border: none; padding: 6px 12px; border-radius: 20px; font-size: 13px; cursor: pointer; white-space: nowrap; transition: 0.2s; }
        .tag-btn.active { background: #0056b3; color: white; font-weight: bold; }

        .card { border: 1px solid #e0e0e0; padding: 15px; border-radius: 10px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; background: #fafafa; }
        .card h3 { color: #0056b3; font-size: 16px; margin-bottom: 4px; }
        .card p { color: #666; font-size: 13px; }
        .price { font-weight: bold; color: #28a745; font-size: 16px; text-align: right; }
        .btn-rent { background: #0056b3; color: white; border: none; padding: 8px 14px; border-radius: 6px; cursor: pointer; margin-top: 5px; font-weight: bold; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 450px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .modal-content h3 { color: #0056b3; margin-bottom: 15px; }
        .modal-content label { font-size: 13px; font-weight: bold; color: #444; display: block; margin-top: 10px; }
        .modal-content input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .btn-confirm { background: #28a745; color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; flex: 1; }
        .btn-cancel { background: #dc3545; color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; flex: 1; }
    </style>
</head>
<body>

<header>
    <img src="/logo-v2.png" alt="CAREMED Logo" class="logo-img">
    <nav>
        <a href="/" class="active">🩺 Pacientes</a>
        <a href="/proveedor.html">🏬 Proveedores</a>
        <a href="/solicitudes.html">📋 Solicitudes</a>
        <a href="/admin.html">🛡️ Administración</a>
    </nav>
</header>

<div class="container">
    <div id="map"></div>
    <div class="panel">
        <h2>Equipos Médicos Disponibles Cerca</h2>
        <br>
        
        <div class="search-container">
            <input type="text" id="input-buscar" class="search-bar" placeholder="🔍 Buscar por nombre (ej. Concentrador, Silla...)" oninput="filtrarEquipos()">
            <div class="filter-tags">
                <button class="tag-btn active" onclick="seleccionarCategoria('Todas', this)">Todas</button>
                <button class="tag-btn" onclick="seleccionarCategoria('Oxígeno', this)">Oxígenoterapia</button>
                <button class="tag-btn" onclick="seleccionarCategoria('Movilidad', this)">Movilidad</button>
                <button class="tag-btn" onclick="seleccionarCategoria('Camas', this)">Camas / Monitores</button>
            </div>
        </div>

        <div id="lista-equipos">Cargando catálogo...</div>
    </div>
</div>

<div id="modal-renta" class="modal">
    <div class="modal-content">
        <h3>📋 Datos de Contacto para Renta</h3>
        <p id="modal-equipo-info" style="font-size: 13px; color: #555; margin-bottom: 10px;"></p>
        <form id="form-paciente">
            <label>Nombre Completo</label>
            <input type="text" id="paciente-nombre" placeholder="Ej. Maria López" required>

            <label>Teléfono de Contacto (WhatsApp)</label>
            <input type="tel" id="paciente-telefono" placeholder="Ej. 618 123 4567" required>

            <label>Dirección de Entrega en Durango</label>
            <input type="text" id="paciente-direccion" placeholder="Ej. Col. Centro, Calle Hidalgo #123" required>

            <div class="modal-btns">
                <button type="submit" class="btn-confirm"> Confirmar y Enviar</button>
                <button type="button" class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
            </div>
        </form>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map').setView([24.0277, -104.6532], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);

    L.marker([24.0277, -104.6532]).addTo(map).bindPopup('<b>Tu Ubicación Actual</b>').openPopup();

    let todosLosEquipos = [];
    let equipoSeleccionado = null;
    let categoriaSeleccionada = 'Todas';
    let MarcadoresEnMapa = [];

    async function cargarEquipos() {
        const contenedor = document.getElementById('lista-equipos');
        try {
            const respuesta = await fetch('/api/equipos');
            const json = await respuesta.json();
            todosLosEquipos = json.data || json;
            renderizarVista(todosLosEquipos);
        } catch (error) {
            contenedor.innerHTML = `<p style="color: red;">⚠️ Error al cargar el catálogo.</p>`;
        }
    }

    function renderizarVista(lista) {
        const contenedor = document.getElementById('lista-equipos');
        MarcadoresEnMapa.forEach(m => map.removeLayer(m));
        MarcadoresEnMapa = [];

        if (!lista || lista.length === 0) {
            contenedor.innerHTML = '<p style="color:#777; text-align:center; padding: 20px;">No se encontraron equipos.</p>';
            return;
        }

        contenedor.innerHTML = '';
        lista.forEach(item => {
            if (item.lat && item.lng) {
                const marker = L.marker([item.lat, item.lng]).addTo(map)
                    .bindPopup(`<b>${item.nombre}</b><br>Proveedor: ${item.proveedor}`);
                MarcadoresEnMapa.push(marker);
            }

            contenedor.innerHTML += `
                <div class="card">
                    <div>
                        <h3>${item.nombre}</h3>
                        <p>Categoría: <strong>${item.categoria}</strong></p>
                        <p>Proveedor: ${item.proveedor}</p>
                    </div>
                    <div>
                        <div class="price">$${item.precio} / mes</div>
                        <button class="btn-rent" onclick="abrirModal('${item.nombre}', ${item.precio}, '${item.proveedor}')">Rentar Ahora</button>
                    </div>
                </div>
            `;
        });
    }

    function abrirModal(nombre, precio, proveedor) {
        equipoSeleccionado = { nombre, precio, proveedor };
        document.getElementById('modal-equipo-info').innerText = `Equipo: ${nombre} ($${precio}/mes) - ${proveedor}`;
        document.getElementById('modal-renta').style.display = 'flex';
    }

    function cerrarModal() {
        document.getElementById('modal-renta').style.display = 'none';
        document.getElementById('form-paciente').reset();
    }

    document.getElementById('form-paciente').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const solicitud = {
            equipo: equipoSeleccionado.nombre,
            precio: equipoSeleccionado.precio,
            proveedor: equipoSeleccionado.proveedor,
            paciente: document.getElementById('paciente-nombre').value,
            telefono: document.getElementById('paciente-telefono').value,
            direccion: document.getElementById('paciente-direccion').value
        };

        try {
            const res = await fetch('/api/solicitudes', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(solicitud)
            });

            if (res.ok) {
                alert(`🎉 ¡Solicitud recibida con éxito!\n\n${solicitud.proveedor} se comunicará al ${solicitud.telefono} para entregar el equipo en: ${solicitud.direccion}.`);
                cerrarModal();
            } else {
                alert('⚠️ Error al registrar solicitud.');
            }
        } catch (err) {
            alert('⚠️ Ocurrió un error al conectar con el servidor.');
        }
    });

    function filtrarEquipos() {
        const texto = document.getElementById('input-buscar').value.toLowerCase();
        const filtrados = todosLosEquipos.filter(item => {
            const coincideTexto = item.nombre.toLowerCase().includes(texto) || item.proveedor.toLowerCase().includes(texto);
            const coincideCategoria = (categoriaSeleccionada === 'Todas') || (item.categoria === categoriaSeleccionada);
            return coincideTexto && coincideCategoria;
        });
        renderizarVista(filtrados);
    }

    function seleccionarCategoria(cat, elemento) {
        categoriaSeleccionada = cat;
        document.querySelectorAll('.tag-btn').forEach(btn => btn.classList.remove('active'));
        elemento.classList.add('active');
        filtrarEquipos();
    }

    cargarEquipos();
</script>

</body>
</html>
