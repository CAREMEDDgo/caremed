<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.A.R.E.M.E.D. - Panel Proveedor</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; }
        body { background: #f0f2f5; }
        
        header { background: #0056b3; color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); flex-wrap: wrap; gap: 10px; }
        header h1 { font-size: 20px; }
        nav { display: flex; gap: 8px; }
        nav a { color: white; text-decoration: none; padding: 6px 12px; border-radius: 6px; background: rgba(255,255,255,0.15); font-size: 13px; font-weight: bold; transition: background 0.2s; }
        nav a:hover, nav a.active { background: white; color: #0056b3; }

        .container { max-width: 600px; margin: 30px auto; padding: 20px; }
        .card-form { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
        h2 { color: #0056b3; margin-bottom: 15px; }
        label { font-size: 13px; font-weight: bold; color: #444; display: block; margin-top: 10px; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        .btn-submit { background: #28a745; color: white; border: none; width: 100%; padding: 12px; margin-top: 20px; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-submit:hover { background: #218838; }
        #mensaje { margin-top: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1>📍 C.A.R.E.M.E.D</h1>
    <nav>
        <a href="/">🩺 Pacientes</a>
        <a href="/proveedor.html" class="active">🏬 Proveedores</a>
        <a href="/admin.html">🛡️ Administración</a>
    </nav>
</header>

<div class="container">
    <div class="card-form">
        <h2>🏬 Registrar Nuevo Equipo Médico</h2>
        <form id="form-proveedor">
            <label>Nombre del Equipo Médico</label>
            <input type="text" id="nombre" placeholder="Ej. Concentrador de Oxígeno 10L" required>

            <label>Categoría</label>
            <select id="categoria" required>
                <option value="Oxígeno">Oxígenoterapia</option>
                <option value="Movilidad">Movilidad</option>
                <option value="Camas">Camas / Monitores</option>
            </select>

            <label>Precio Mensual ($ MXN)</label>
            <input type="number" id="precio" placeholder="Ej. 1800" required>

            <label>Nombre de tu Casa Médica / Proveedor</label>
            <input type="text" id="proveedor" placeholder="Ej. MedEquip Durango" required>

            <button type="submit" class="btn-submit">➕ Registrar en Catálogo</button>
        </form>
        <div id="mensaje"></div>
    </div>
</div>

<script>
    document.getElementById('form-proveedor').addEventListener('submit', async (e) => {
        e.preventDefault();
        const msgDiv = document.getElementById('mensaje');
        msgDiv.style.color = 'black';
        msgDiv.innerText = 'Guardando...';

        const nuevoEquipo = {
            nombre: document.getElementById('nombre').value,
            categoria: document.getElementById('categoria').value,
            precio: parseFloat(document.getElementById('precio').value),
            proveedor: document.getElementById('proveedor').value,
            lat: 24.0277 + (Math.random() - 0.5) * 0.02,
            lng: -104.6532 + (Math.random() - 0.5) * 0.02
        };

        try {
            const respuesta = await fetch('/api/equipos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(nuevoEquipo)
            });

            if (respuesta.ok) {
                msgDiv.style.color = 'green';
                msgDiv.innerText = '✅ ¡Equipo publicado con éxito!';
                document.getElementById('form-proveedor').reset();
            } else {
                throw new Error('No se pudo guardar');
            }
        } catch (error) {
            msgDiv.style.color = 'red';
            msgDiv.innerText = '⚠️ Error al conectar con el servidor.';
        }
    });
</script>

</body>
</html>
